<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0000" />

    <title>Anwar's Bill Splitter</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <svg width="0" height="0" style="position: absolute; pointer-events: none;">
        <filter id="liquid-glass" color-interpolation-filters="sRGB">
            <feTurbulence type="fractalNoise" baseFrequency="0.004" numOctaves="2" seed="1" result="liquid" />
            
            <feDisplacementMap in="SourceGraphic" in2="liquid" scale="70" xChannelSelector="R" yChannelSelector="G" />
        </filter>
    </svg>

    <div class="liquid-glass-box">
        <h2>Anwar's Bill Splitter</h2>
        
        <form id="bill-form">
            <div class="row">
                <label><strong>Currency:</strong></label>
                <select id="currency" name="currency">
                    <option value="RM">MYR (RM)</option>
                    <option value="$">USD ($)</option>
                    <option value="€">EUR (€)</option>
                    <option value="£">GBP (£)</option>
                    <option value="¥">JPY (¥)</option>
                </select>
            </div>

            <hr>

            <h3>1. Who ordered what?</h3>
            <div id="people-container">
                <div class="row person-row">
                    <input type="text" name="names[]" placeholder="Person's Name" required>
                    <input type="number" step="0.01" name="costs[]" placeholder="Item Cost" required>
                    <button type="button" class="btn-remove" onclick="removeRow(this)" title="Remove">X</button>
                </div>
                <div class="row person-row">
                    <input type="text" name="names[]" placeholder="Person's Name" required>
                    <input type="number" step="0.01" name="costs[]" placeholder="Item Cost" required>
                    <button type="button" class="btn-remove" onclick="removeRow(this)" title="Remove">X</button>
                </div>
            </div>
            <button type="button" class="btn-add" onclick="addPerson()">+ Add Another Person</button>

            <hr>

            <h3>2. Taxes & Fees</h3>
            <div id="taxes-container">
                <div class="row tax-row">
                    <input type="text" name="tax_names[]" placeholder="Tax Name (e.g. VAT)">
                    <input type="number" step="0.01" name="tax_values[]" placeholder="Amount/Value" value="0" required>
                    <select name="tax_types[]">
                        <option value="amount">Flat Amount</option>
                        <option value="percent">Percentage (%)</option>
                    </select>
                    <button type="button" class="btn-remove" onclick="removeRow(this)" title="Remove">X</button>
                </div>
            </div>
            <button type="button" class="btn-add" onclick="addTax()">+ Add Another Tax</button>
            <hr>

            <h3>3. Tip / Service Charge</h3>
            <div class="row">
                <label>Total Tip (Flat Amount):</label>
                <input type="number" step="0.01" id="tip-amount" value="0" required>
            </div>

            <button type="submit" class="btn-submit">Calculate Split</button>
        </form>
    </div>

    <div id="results-container"></div>

    <script src="script.js"></script>
</body>
</html>
